<div style="margin: auto; width: 1000px; margin-top: 30px;">
    <table class="table table-bordered table-striped text-center" style="margin-top: 20px;">
        <caption>List of URLs</caption>
        <thead>
            <tr>
                <th scope="col" style="min-width: 50px;">id</th>
                <th scope="col">Original url</th>
                <th scope="col" style="min-width: 130px;">Created by</th>
                <th scope="col" style="min-width: 200px;">Date of adding</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">{{url.id}}</th>
                <td>{{url.longUrl}}</td>
                <td>{{url.createdBy}}</td>
                <td>{{url.createdAt | date:'dd.MM.yyyy HH:mm:ss UTC' }}</td>
            </tr>
        </tbody>
    </table>
</div>
